<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snip. — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── HEADER ──────────────────────────────────────── -->
  <header class="header">
    <div class="logo">Snip<span class="dot">.</span></div>
    <p class="tagline">Shorten. Share. Track.</p>
  </header>

  <!-- ── HERO / FORM ─────────────────────────────────── -->
  <main class="main">
    <section class="form-section">
      <h1 class="hero-title">Make your links <span class="accent">shorter</span></h1>
      <p class="hero-sub">Paste a long URL below and get a clean short link instantly.</p>

      <div class="form-card">
        <div class="input-row">
          <input
            type="url"
            id="urlInput"
            class="url-input"
            placeholder="https://your-very-long-url.com/goes/here"
          />
          <button class="btn-shorten" id="btnShorten">Shorten</button>
        </div>
        <p class="error-msg hidden" id="errorMsg">Please enter a valid URL.</p>
      </div>

      <!-- Result -->
      <div class="result-card hidden" id="resultCard">
        <div class="result-label">Your short link</div>
        <div class="result-row">
          <span class="short-url" id="shortUrl"></span>
          <button class="btn-copy" id="btnCopy">Copy</button>
        </div>
        <div class="result-original" id="originalUrl"></div>
      </div>
    </section>

    <!-- ── LINKS TABLE ──────────────────────────────── -->
    <section class="links-section">
      <div class="links-header">
        <h2 class="links-title">Your Links</h2>
        <span class="link-count" id="linkCount">0 links</span>
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <p>No links yet. Shorten your first URL above.</p>
      </div>

      <div class="links-table" id="linksTable">
        <!-- Rows injected by JS -->
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
